<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI训练师_四级 - 刷题工具</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>

<body>
    <div class="app-container">
        <!-- 侧边栏导航 -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <h1>AI训练师_四级</h1>
            </div>
            <nav class="menu">
                <button id="nav-all" class="menu-item active" onclick="switchMode('all')">
                    <span class="icon">📚</span> <span class="nav-text">全部<span class="hide-mobile">题库</span></span>
                </button>
                <button id="nav-wrong" class="menu-item" onclick="switchMode('wrong')">
                    <span class="icon">❌</span> <span class="nav-text">错题<span class="hide-mobile">集</span></span> <span
                        id="wrong-count" class="badge">0</span>
                </button>
                <button id="nav-fav" class="menu-item" onclick="switchMode('fav')">
                    <span class="icon">⭐</span> <span class="nav-text">收藏<span class="hide-mobile">题集</span></span>
                    <span id="fav-count" class="badge badge-fav">0</span>
                </button>
                <button id="nav-exam" class="menu-item" onclick="switchMode('exam')">
                    <span class="icon">⏱️</span> <span class="nav-text">模拟<span class="hide-mobile">考试</span></span>
                </button>
            </nav>
            <div class="footer-info">
                <button class="jump-progress-btn" onclick="jumpToCurrentProgress()">🚀 回到当前进度</button>
                <button class="reset-btn" onclick="resetProgress()">重置学习进度</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="top-bar">
                <h2 id="mode-title">📚 全部题库</h2>
                <div class="user-actions">
                    <span id="timer-display" class="timer hidden" title="考试剩余时间">01:30:00</span>
                    <span id="current-index-display" onclick="handleProgressClick()" title="点击查看进度/答题卡">1 / 1000</span>
                </div>
            </header>

            <div id="quiz-card" class="quiz-card">
                <div class="card-header">
                    <span class="q-type">单选题</span>
                    <span id="q-difficulty" class="q-difficulty">难度：一般</span>
                    <button id="fav-btn" class="fav-btn" onclick="toggleFav()" title="收藏题目"><span
                            class="star-icon">☆</span> 收藏</button>
                </div>

                <div class="q-content">
                    <p id="q-text" class="q-text">正在加载题目...</p>
                </div>

                <div id="options-list" class="options-list">
                    <!-- 选项将在这里动态生成 -->
                </div>

                <div id="feedback-area" class="feedback-area hidden">
                    <div class="answer-row">
                        <span class="ans-label">正确答案：</span>
                        <span id="correct-ans" class="ans-value">A</span>
                    </div>
                    <div class="analysis-box">
                        <h4>解析：</h4>
                        <p id="analysis-text">这里是解析内容...</p>
                    </div>
                </div>

                <div class="card-footer">
                    <button id="prev-btn" class="btn secondary" onclick="prevQuestion()" disabled>上一题</button>
                    <button id="submit-btn" class="btn primary hidden" onclick="submitMultiAnswer()">提交答案</button>
                    <button id="show-ans-btn" class="btn outline" onclick="showAnswer()">查看答案</button>
                    <button id="next-btn" class="btn primary" onclick="nextQuestion()">下一题</button>
                    <button id="submit-exam-btn" class="btn warning hidden" onclick="submitExam()">交卷</button>
                    <button id="exit-review-btn" class="btn warning hidden" onclick="exitExamReview()">结束回顾</button>
                </div>
            </div>

            <!-- 空状态显示 -->
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">🎉</div>
                <h3>暂无题目</h3>
                <p>当前列表中没有可练习的题目。</p>
                <button class="btn primary" onclick="switchMode('all')">返回全部题库</button>
            </div>

            <!-- 考试准备状态 -->
            <div id="exam-start-state" class="empty-state hidden">
                <div class="empty-icon">⏱️</div>
                <h3>模拟考试</h3>
                <p class="exam-desc">考试时长：90分钟。<br>系统将从题库随机抽取试题。准备好了吗？</p>
                <button class="btn primary" onclick="startExam()">开始考试</button>
            </div>

            <!-- 考试结果状态 -->
            <div id="exam-result-state" class="empty-state hidden">
                <div class="empty-icon">🏆</div>
                <h3 id="exam-score-title">考试成绩</h3>
                <p id="exam-result-desc" class="exam-desc">得分：0 / 100<br>用时：00:00</p>
                <div class="exam-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                    <button id="review-all-btn" class="btn outline hidden" onclick="reviewExamAll()">回顾整卷</button>
                    <button id="add-wrong-btn" class="btn outline" onclick="addAllExamWrongToBank()">一键加入错题集</button>
                    <button class="btn primary" onclick="switchMode('all')">退出考试</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 答题卡弹窗 -->
    <div id="answer-sheet-modal" class="modal hidden">
        <div class="modal-overlay" onclick="closeAnswerSheet()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>答题卡</h3>
                <button class="close-btn" onclick="closeAnswerSheet()">×</button>
            </div>
            <div class="modal-body">
                <div id="answer-sheet-grid" class="answer-sheet-content">
                    <!-- JavaScript 将在这里生成数字方块 -->
                </div>
            </div>
        </div>
    </div>

    <script>window.APP_EXAM_ID = "AI训练师_四级";</script>
    <script src="../assets/script.js"></script>
</body>

</html>
